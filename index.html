<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Asertividad - Inicio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .chat-card { background: white; width: 95%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #4a90e2; color: white; padding: 20px; text-align: center; font-weight: bold; }
        .progress-bar { height: 6px; background: #eee; width: 100%; }
        #progress { height: 100%; background: #27ae60; width: 0%; transition: 0.3s; }
        .scenario-box { padding: 15px; background: #f9f9f9; border-bottom: 1px solid #eee; font-style: italic; color: #666; font-size: 0.9em; }
        .chat-content { padding: 25px; min-height: 100px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 1.1em; }
        .options { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; border: 2px solid #4a90e2; background: white; color: #4a90e2; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        button:hover { background: #4a90e2; color: white; }
        .feedback-view { display: none; padding: 20px; text-align: center; }
        .next-btn { background: #27ae60; color: white; border: none; width: 100%; margin-top: 10px; }
        .btn-final { display: inline-block; padding: 15px 25px; background: #4a90e2; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="header">Práctica de Inteligencia Emocional</div>
    <div class="progress-bar"><div id="progress"></div></div>
    
    <div id="game-view">
        <div id="scenario" class="scenario-box"></div>
        <div id="chat" class="chat-content"></div>
        <div id="options" class="options"></div>
    </div>

    <div id="feedback-view" class="feedback-view">
        <h3 id="f-title"></h3>
        <p id="f-text"></p>
        <button class="next-btn" onclick="nextLevel()">Siguiente Escenario</button>
    </div>

    <div id="final-view" class="feedback-view">
        <h2>Resultados de Práctica</h2>
        <div id="final-score-container"></div>
    </div>
</div>

<script>
    const levels = [
        { s: "Situación 1: Un amigo te pide dinero por tercera vez sin pagarte antes.", d: "Oye, ¿me prestas $200? Te los pago el viernes.", 
          opts: [{t: "¡Ya basta! Eres un abusivo.", p:0, f:"Agresivo"}, {t: "Bueno, está bien...", p:1, f:"Pasivo"}, {t: "No me siento cómodo prestándote más hasta que saldemos lo anterior.", p:3, f:"Asertivo"}]},
        { s: "Situación 2: Alguien se mete en la fila frente a ti.", d: "(Te ignora y se mete)", 
          opts: [{t: "¡Quítate de ahí, fíjate!", p:0, f:"Agresivo"}, {t: "(Te callas y te enojas)", p:1, f:"Pasivo"}, {t: "Disculpa, yo estaba antes en la fila.", p:3, f:"Asertivo"}]},
        { s: "Situación 3: Tu equipo no trabajó y tú hiciste todo.", d: "¿Lo puedes entregar tú?", 
          opts: [{t: "¡Son unos flojos!", p:0, f:"Agresivo"}, {t: "Sí, yo lo hago...", p:1, f:"Pasivo"}, {t: "Entreguemos lo que hay y hablemos con el profe sobre la carga de trabajo.", p:3, f:"Asertivo"}]},
        { s: "Situación 4: Te critican injustamente en público.", d: "¡Qué mal lo hiciste!", 
          opts: [{t: "¡Usted qué sabe!", p:0, f:"Agresivo"}, {t: "(Te pones triste)", p:1, f:"Pasivo"}, {t: "¿Podría decirme qué puntos específicos debo mejorar?", p:3, f:"Asertivo"}]},
        { s: "Situación 5: Comentario incómodo familiar.", d: "¡Qué gordo/a te ves!", 
          opts: [{t: "¡Y usted qué vieja!", p:0, f:"Agresivo"}, {t: "(Finges una sonrisa)", p:1, f:"Pasivo"}, {t: "Me incomoda que hables de mi cuerpo, hablemos de otra cosa.", p:3, f:"Asertivo"}]}
    ];

    let cur = 0, score = 0;
    function init() {
        if(cur >= levels.length) { showFinal(); return; }
        const l = levels[cur];
        document.getElementById('progress').style.width = (cur/5*100)+"%";
        document.getElementById('scenario').innerText = l.s;
        document.getElementById('chat').innerText = l.d;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        l.opts.forEach(o => {
            const b = document.createElement('button');
            b.innerText = o.t;
            b.onclick = () => { score+=o.p; showF(o); };
            optDiv.appendChild(b);
        });
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('feedback-view').style.display = 'none';
    }
    function showF(o) {
        document.getElementById('game-view').style.display = 'none';
        document.getElementById('feedback-view').style.display = 'block';
        document.getElementById('f-title').innerText = o.f;
        document.getElementById('f-text').innerText = "Elegiste una respuesta de tipo " + o.f + ".";
    }
    function nextLevel() { cur++; init(); }
    function showFinal() {
        document.getElementById('game-view').style.display = 'none';
        document.getElementById('feedback-view').style.display = 'none';
        document.getElementById('final-view').style.display = 'block';
        document.getElementById('progress').style.width = "100%";
        document.getElementById('final-score-container').innerHTML = `
            <p>Obtuviste ${score}/15 puntos en asertividad.</p>
            <p>Para terminar, completa el cuestionario formal:</p>
            <a href="cuestionario.html" class="btn-final">Ir al Cuestionario Final →</a>
        `;
    }
    init();
</script>
</body>
</html>
